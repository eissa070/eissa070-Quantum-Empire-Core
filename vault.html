<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Vault | Eissa Edition</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050505; --neon: #00ff41; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .crypto-ticker { background: #111; padding: 10px; display: flex; gap: 20px; border-bottom: 1px solid #222; font-family: monospace; font-size: 0.9rem; justify-content: center; }
        .header { border-bottom: 2px solid var(--gold); padding: 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,204,0,0.05); }
        .main-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #0f0f0f; border: 1px solid #222; padding: 20px; border-radius: 12px; position: relative; }
        .card:hover { border-color: var(--gold); }
        .balance { font-size: 2rem; font-weight: bold; color: var(--gold); margin: 10px 0; }
        .btn-action { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn-action:hover { background: var(--gold); color: black; }
        .up { color: var(--neon); }
    </style>
</head>
<body>
    <div class="crypto-ticker" id="crypto-ticker">
        <div>BTC: <span id="btc-price">Loading...</span></div>
        <div>ETH: <span id="eth-price">Loading...</span></div>
        <div>BNB: <span id="bnb-price">Loading...</span></div>
        <div>USDT: <span class="up">1.00$</span></div>
    </div>
    <div class="header">
        <h1 style="color: var(--gold); margin: 0;">🔱 مركز العمليات والتمويل</h1>
        <span style="color: var(--neon);">● Admin: Eissa</span>
    </div>
    <div class="main-grid">
        <div class="card">
            <h3>محفظة العملات الرقمية</h3>
            <div style="font-family: monospace; font-size: 0.8rem; background: #000; padding: 10px; margin: 10px 0;">Wallet: 0x71C...Eissa070</div>
            <button class="btn-action">سحب الأرباح عبر PayPal</button>
        </div>
        <div class="card">
            <h3>📦 برنامج المبيعات الشامل</h3>
            <div style="margin: 15px 0;">
                <div>مبيعات اليوم: <span class="up">+450$</span></div>
                <div>المخزون: مستقر ✅</div>
            </div>
            <button class="btn-action">فتح لوحة التحكم</button>
        </div>
        <div class="card">
            <h3>الرصيد والكريديت المجاني</h3>
            <div class="balance">150.00$</div>
            <p style="font-size: 0.8rem; color: #666;">رصيد مجمع من GitHub & Google Cloud</p>
            <button class="btn-action">تحديث الأرصدة</button>
        </div>
    </div>
    <script>
        async function getPrices() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,binancecoin&vs_currencies=usd');
                const data = await res.json();
                document.getElementById('btc-price').innerText = data.bitcoin.usd.toLocaleString() + '$';
                document.getElementById('eth-price').innerText = data.ethereum.usd.toLocaleString() + '$';
                document.getElementById('bnb-price').innerText = data.binancecoin.usd.toLocaleString() + '$';
            } catch (err) { console.log("Update Failed"); }
        }
        getPrices(); setInterval(getPrices, 30000);
    </script>
</body>
</html>
