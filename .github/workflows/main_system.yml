name: 🛡️ Eissa Empire System

on:
  repository_dispatch:
    types: [start_mission]
  workflow_dispatch: # إضافة إمكانية التشغيل اليدوي من الموقع مباشرة للتجربة
  schedule:
    - cron: '0 */6 * * *' # يعمل كل 6 ساعات تلقائياً

jobs:
  execute:
    runs-on: ubuntu-latest
    permissions:
      contents: write # ضروري جداً لتحديث القائمة السوداء تلقائياً
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: ⚙️ Install Dependencies
        run: pip install requests

      - name: ⚔️ Run Eissa Task Runner
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # التأكد من استقبال الرابط سواء من الـ Vault أو يدوي
          TARGET_URL: ${{ github.event.client_payload.url || 'https://www.google.com' }} 
        run: python task_runner.py

      - name: 💾 Sync & Push Changes (Blacklist/Fail Counts)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Eissa-Bot"
          git add blacklist.txt fail_counts.json || echo "No changes to add"
          git commit -m "🤖 Auto-update: Blacklist/Radar Status [Skip CI]" || echo "Nothing to commit"
          git push || echo "Push failed or nothing to push"