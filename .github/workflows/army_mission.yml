name: 🚀 Eissa Army Deployment

on:
  repository_dispatch:
    types: [start_army_mission]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/experimental/setup-python@v4
        with:
          python-version: '3.10'

      - name: ⚙️ Install Dependencies
        run: pip install requests

      - name: ⚔️ Execute Mission
        env:
          # الأسرار التي وضعتها في إعدادات GitHub
          MY_EMPIRE_TOKEN: ${{ secrets.MY_EMPIRE_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # البيانات القادمة من واجهة Vault
          TARGET_URL: ${{ github.event.client_payload.url }}
        run: python task_runner.py