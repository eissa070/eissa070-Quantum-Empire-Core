<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Empire | Command Center</title>
    <style>
        :root { 
            --neon: #00ff41; 
            --bg: #0a0a0a; 
            --card-bg: rgba(255, 255, 255, 0.05);
        }
        
        body { 
            background: var(--bg); color: white; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px; margin: 0; overflow-x: hidden;
        }

        h1 { color: var(--neon); text-shadow: 0 0 15px var(--neon); letter-spacing: 5px; margin-top: 40px; }

        #status-container { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 25px; width: 100%; max-width: 1100px; margin-top: 40px;
        }

        .card { 
            background: var(--card-bg); border: 1px solid rgba(0, 255, 65, 0.1); 
            padding: 25px; border-radius: 15px; transition: 0.3s;
        }

        .card:hover { border-color: var(--neon); transform: translateY(-5px); box-shadow: 0 0 20px rgba(0, 255, 65, 0.1); }

        .latency { 
            color: var(--neon); font-family: monospace; 
            background: rgba(0, 255, 65, 0.1); padding: 8px 15px; 
            border-radius: 5px; display: inline-block; margin-top: 15px;
        }

        /* --- تصميم الممر السري المطور --- */
        #vault-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98); z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(10px);
        }

        .input-wrapper {
            position: relative; width: 80%; max-width: 500px; margin-top: 20px;
        }

        #vault-input {
            background: transparent; border: none; border-bottom: 3px solid var(--neon);
            color: var(--neon); font-size: 2.5rem; text-align: center;
            outline: none; font-family: monospace; width: 100%; letter-spacing: 10px;
        }

        #toggle-eye {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: var(--neon); font-size: 1.8rem; opacity: 0.6;
        }

        .vault-hint { color: #555; margin-top: 20px; font-size: 0.8rem; text-transform: uppercase; }
    </style>
</head>
<body>

    <!-- واجهة البوابة السرية مع ميزة العين -->
    <div id="vault-overlay">
        <div style="color: var(--neon); font-size: 1.2rem; text-shadow: 0 0 10px var(--neon);">IDENTITY VERIFICATION</div>
        <div class="input-wrapper">
            <input type="password" id="vault-input" autocomplete="off">
            <span id="toggle-eye">👁️</span>
        </div>
        <div class="vault-hint">System access restricted to Eissa Aly</div>
    </div>

    <h1>QUANTUM EMPIRE RADAR</h1>
    <div id="status-container">جاري مزامنة الإشارة الاستراتيجية...</div>
    <div id="last-update" style="margin-top: 40px; color: #444;"></div>

    <script>
        // 1. تحديث الرادار العلني
        async function refreshRadar() {
            try {
                const response = await fetch('./data.json?v=' + new Date().getTime());
                const result = await response.json();
                document.getElementById('last-update').innerText = `آخر تحديث: ${result.last_update}`;
                const container = document.getElementById('status-container');
                container.innerHTML = '';
                const targets = result.data || result;
                targets.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div style="font-size: 1.5rem; font-weight: bold;">${item.name}</div>
                        <div style="color: ${item.status.includes('✅') ? '#00ff41' : '#ff3131'};">${item.status}</div>
                        <div class="latency">الاستجابة: ${item.latency}</div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) { console.error(err); }
        }

        // 2. تفعيل الممر السري
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'v') {
                document.getElementById('vault-overlay').style.display = 'flex';
                document.getElementById('vault-input').focus();
            }
            if (e.key === 'Escape') document.getElementById('vault-overlay').style.display = 'none';
        });

        // 3. وظيفة العين (إظهار الباسورد)
        const toggleEye = document.getElementById('toggle-eye');
        const vaultInput = document.getElementById('vault-input');
        toggleEye.addEventListener('click', () => {
            const type = vaultInput.getAttribute('type') === 'password' ? 'text' : 'password';
            vaultInput.setAttribute('type', type);
            toggleEye.textContent = type === 'password' ? '👁️' : '🕶️';
        });

        // 4. التحقق من الدخول
        vaultInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (e.target.value === 'eissaaly07') { window.location.href = 'vault.html'; }
                else { alert('ACCESS DENIED'); location.reload(); }
            }
        });

        refreshRadar();
        setInterval(refreshRadar, 60000);
    </script>
</body>
</html>
