<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Empire | Radar</title>
    <style>
        :root { --neon: #00ff41; --bg: #0a0a0a; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { color: var(--neon); text-shadow: 0 0 10px var(--neon); letter-spacing: 3px; }
        #status-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(0,255,65,0.2); padding: 20px; border-radius: 12px; transition: 0.3s; }
        .card:hover { border-color: var(--neon); transform: translateY(-5px); box-shadow: 0 0 20px rgba(0,255,65,0.1); }
        .latency { color: var(--neon); font-family: monospace; background: rgba(0,255,65,0.1); padding: 5px 10px; border-radius: 4px; display: inline-block; margin-top: 10px; }
        .update-time { margin-top: 30px; color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>
    <h1>QUANTUM EMPIRE RADAR</h1>
    <div id="status-container">جاري مزامنة الإشارة مع الأقمار الصناعية...</div>
    <div class="update-time" id="last-update"></div>

    <script>
        async function refreshRadar() {
            try {
                // منع التخزين المؤقت عبر إضافة رقم عشوائي للرابط
                const response = await fetch('./data.json?update=' + new Date().getTime());
                const result = await response.json();
                
                const container = document.getElementById('status-container');
                const updateElem = document.getElementById('last-update');
                
                updateElem.innerText = `آخر مزامنة للنظام: ${result.last_update}`;
                container.innerHTML = '';

                result.data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div style="font-size: 1.4rem; font-weight: bold;">${item.name}</div>
                        <div style="font-size: 0.7rem; color: #888;">${item.type}</div>
                        <div style="margin: 15px 0; color: ${item.status.includes('✅') ? '#00ff41' : '#ff3131'}">${item.status}</div>
                        <div class="latency">الاستجابة: ${item.latency}</div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                console.error("خطأ في الاتصال:", err);
            }
        }
        refreshRadar();
        setInterval(refreshRadar, 60000); // تحديث الواجهة كل دقيقة
    </script>
</body>
</html>
